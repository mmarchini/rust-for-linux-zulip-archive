on:
  schedule:
    - cron: '*/60 * * * *'
  workflow_dispatch:


jobs:
  publish_archive_job:
    runs-on: ubuntu-latest
    concurrency:
      group: zulip-archive
      cancel-in-progress: false
    name: A job to publish zulip-archive in GitHub pages
    steps:

      - name: Checkout
        uses: actions/checkout@v3

      - name: Run archive
        id: archive
        uses: zulip/zulip-archive@master
        with:
          zuliprc: ${{ secrets.ZULIPRC }}
          # Using the GitHub Token that is provided automatically by GitHub Actions
          # (no setup needed).
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Turn it on in the future if git history becomes a problem
          delete_history: false
          archive_branch: main
